[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tollgate-sdk"
version = "0.1.0"
description = "Python SDK for the Tollgate agent control plane"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.0",
]

[project.urls]
Homepage = "https://tollgate.dev"
Repository = "https://github.com/tollgate/tollgate"

[tool.hatch.build.targets.wheel]
packages = ["src/tollgate"]

[dependency-groups]
dev = [
    "mypy>=1.8",
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "respx>=0.21",
    "anyio>=4.0",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.mypy]
strict = true
python_version = "3.10"
mypy_path = "src"

[tool.ruff.lint]
select = ["E", "F", "I"]
