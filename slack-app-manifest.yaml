# Slack App Manifest for Tollgate
#
# This manifest contains dev-specific URLs that need to be updated per environment.
# Replace the ngrok URLs below with your PUBLIC_BASE_URL when setting up a new dev environment.
#
# Example: If your PUBLIC_BASE_URL is https://abc123.ngrok-free.app, replace all occurrences of
# https://97ed-39-58-206-231.ngrok-free.app with https://abc123.ngrok-free.app
#

display_information:
  name: Tollgate
  description: AI Agent Policy & Approval Layer
  background_color: "#2c2d30"

features:
  bot_user:
    display_name: Tollgate
    always_online: true
  slash_commands:
    - command: /tollgate
      url: https://97ed-39-58-206-231.ngrok-free.app/integrations/slack/commands
      description: Manage Tollgate approvals
      usage_hint: "[pending]"
      should_escape: false

oauth_config:
  redirect_urls:
    - https://97ed-39-58-206-231.ngrok-free.app/integrations/slack/callback
  scopes:
    bot:
      - chat:write
      - chat:write.public
      - commands
      - im:write
      - users:read
      - users:read.email

settings:
  interactivity:
    is_enabled: true
    request_url: https://97ed-39-58-206-231.ngrok-free.app/integrations/slack/interactions
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
