services:
  postgres:
    image: postgres:16
    container_name: tollgate-postgres
    environment:
      POSTGRES_USER: tollgate
      POSTGRES_PASSWORD: tollgate
      POSTGRES_DB: tollgate
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tollgate"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-test:
    image: postgres:16
    container_name: tollgate-postgres-test
    environment:
      POSTGRES_USER: tollgate_test
      POSTGRES_PASSWORD: tollgate_test
      POSTGRES_DB: tollgate_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tollgate_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: tollgate-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
